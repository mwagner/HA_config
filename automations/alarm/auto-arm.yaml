# auto-arm away when nobody is home (auto_arm_away_on_unoccupied)
# This does not disarm automatically, and only arms if currently disarmed.
- id: f7b520b8-9182-453e-ad9e-ef904ab4ae4e
  alias: Auto-arm away when nobody is home
  description: Auto-arm away when nobody is home
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.home_occupied
      to: "off"
      # for: "00:05:00"
      for: "00:00:05"
  condition:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: "disarmed"
  action:
    - service: alarm_control_panel.alarm_arm_away
      target:
        entity_id: alarm_control_panel.home_alarm
