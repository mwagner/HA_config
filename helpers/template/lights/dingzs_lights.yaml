---
- light:
    # ####### ############################### #######
    # ####### Dingz Light Template Livingroom #######
    # ####### ############################### #######

    # ####### Spot Lights Entree
    - name: Spotlights Livingroom Main
      unique_id: livingroom_ceiling_spotlights_main
      level: "{{ (state_attr('sensor.dingz_livingroom1_state', 'dimmers')[0]['output']*255/100)|int }}"
      state: "{{ state_attr('sensor.dingz_livingroom1_state', 'dimmers')[0]['on']}}"
      turn_on:
        - entity_id: light.livingroom_ceiling_spotlights_main
          action: script.dingz_light_level_generic
          data:
            brightness: "80"
            enum: "on"
            dimmer: 0
            ip: !secret ip_dingz_livingroom1
            force_entity: sensor.dingz_livingroom1_state
      turn_off:
        - entity_id: light.livingroom_ceiling_spotlights_main
          action: script.dingz_light_level_generic_onoff
          data:
            enum: "off"
            dimmer: 0
            ip: !secret ip_dingz_livingroom1
            force_entity: sensor.dingz_livingroom1_state
      set_level:
        - entity_id: light.livingroom_ceiling_spotlights_main
          action: script.dingz_light_level_generic
          data:
            brightness: "{{ (brightness * 100 / 255) | int }}"
            enum: "on"
            dimmer: 0
            ip: !secret ip_dingz_livingroom1
            force_entity: sensor.dingz_livingroom1_state
      default_entity_id: light.livingroom_ceiling_spotlights_main

