---
- sensor:
    # ####### ###################### #######
    # ####### Wattage Sensoren Dingz #######
    # ####### ###################### #######

    # https://community.home-assistant.io/t/mystrom-smart-switch-in-energy-consumption-overview-page/367686

    - name: Dingz Livingroom1 Output1 Power
      unique_id: template.sensor_dingz_livingroom1_power1
      state: "{{ state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][0]['value']|float|round(1) }}"
      device_class: power
      unit_of_measurement: "W"
      attributes:
        last_updated: "{{ now() }}"

    - name: Dingz Livingroom1 Output2 Power
      unique_id: template.sensor_dingz_livingroom1_power2
      state: "{{ state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][1]['value']|float|round(1) }}"
      device_class: power
      unit_of_measurement: "W"
      attributes:
        last_updated: "{{ now() }}"

    - name: Dingz Livingroom1 Output3 Power
      unique_id: template.sensor_dingz_livingroom1_power3
      state: "{{ state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][2]['value']|float|round(1) }}"
      device_class: power
      unit_of_measurement: "W"
      attributes:
        last_updated: "{{ now() }}"

    - name: Dingz Livingroom1 Output4 Power
      unique_id: template.sensor_dingz_livingroom1_power4
      state: "{{ state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][3]['value']|float|round(1) }}"
      device_class: power
      unit_of_measurement: "W"
      attributes:
        last_updated: "{{ now() }}"

    - name: Dingz Livingroom1 W
      unique_id: template.sensor_dingz_power_livingroom1
      state: "{{
        (
        state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][0]['value'] +
        state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][1]['value'] +
        state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][2]['value'] +
        state_attr('sensor.dingz_livingroom1_state', 'sensors')['power_outputs'][3]['value']
        )|float|round(1)
        }}"
      device_class: power
      unit_of_measurement: "W"
      attributes:
        last_updated: "{{ now() }}"
